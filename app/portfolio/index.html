<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>RV · Staff Engineer &amp; Frontend Platform</title>
    <base href="/" />

    <meta
      name="description"
      content="Portfolio — Staff engineer focused on frontend platform, scalable React, and developer experience."
    />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0c0a09" />

    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,400&family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script>
      (function () {
        var KEY = '@org/portfolio/theme-preference';
        try {
          var raw = localStorage.getItem(KEY);
          var pref =
            raw === 'light' || raw === 'dark' || raw === 'system'
              ? raw
              : 'system';
          var dark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var resolved = pref === 'system' ? (dark ? 'dark' : 'light') : pref;
          document.documentElement.setAttribute('data-theme', resolved);
          document.documentElement.style.colorScheme = resolved;
          document.documentElement.setAttribute('data-theme-preference', pref);
          var meta = document.querySelector('meta[name="theme-color"]');
          if (meta)
            meta.setAttribute(
              'content',
              resolved === 'dark' ? '#0c0a09' : '#f0efec',
            );
        } catch (e) {
          document.documentElement.setAttribute('data-theme', 'dark');
          document.documentElement.style.colorScheme = 'dark';
        }
      })();
    </script>
    <link rel="stylesheet" href="/src/styles.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
